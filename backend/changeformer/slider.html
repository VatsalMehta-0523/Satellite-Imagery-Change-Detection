<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Image Comparison | Hackathon Demo</title>
    <style>
        :root {
            --slider-pos: 50%;
            --accent-color: #00f2ff;
            --bg-color: #0a0a0c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            position: relative;
            width: 95vw;
            height: 90vh;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #000;
        }

        /* The images */
        .image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .image-before {
            z-index: 1;
        }

        .image-after {
            z-index: 2;
            clip-path: inset(0 0 0 var(--slider-pos));
        }

        /* Slider Input */
        .slider {
            position: absolute;
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 100%;
            background: transparent;
            outline: none;
            margin: 0;
            z-index: 3;
            cursor: ew-resize;
        }

        /* The Slider Line */
        .slider-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: white;
            left: var(--slider-pos);
            transform: translateX(-50%);
            z-index: 4;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        /* Slider Handle Tooltip */
        .slider-handle {
            position: absolute;
            top: 50%;
            left: var(--slider-pos);
            transform: translate(-50%, -50%);
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .slider-handle::before, .slider-handle::after {
            content: '';
            border: solid #111;
            border-width: 0 3px 3px 0;
            display: inline-block;
            padding: 4px;
        }

        .slider-handle::before {
            transform: rotate(135deg);
            margin-right: 2px;
        }

        .slider-handle::after {
            transform: rotate(-45deg);
            margin-left: 2px;
        }

        /* Labels */
        .label {
            position: absolute;
            top: 20px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            z-index: 6;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
        }

        .label-before {
            left: 20px;
            color: #fff;
        }

        .label-after {
            right: 20px;
            color: var(--accent-color);
        }

        /* Instructions Overlay */
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            z-index: 6;
            pointer-events: none;
        }

        /* Input specific hidden styling to avoid browser defaults */
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 2px;
            height: 100vh;
            background: transparent;
        }

        .slider::-moz-range-thumb {
            width: 2px;
            height: 100vh;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Labels -->
        <div class="label label-before">2018 Imagery</div>
        <div class="label label-after">2026 Prediction/Update</div>

        <!-- Images -->
        <!-- Replace src with your local image names -->
        <img src="South_bopal_1_2018_TCI_try.png" class="image image-before" alt="Before">
        <img src="South_bopal_1_2026_TCI_try.png" class="image image-after" alt="After">

        <!-- Interaction Layers -->
        <div class="slider-line"></div>
        <div class="slider-handle"></div>
        
        <input type="range" min="0" max="100" value="50" class="slider" id="image-slider">

        <div class="instructions">Drag to compare details</div>
    </div>

    <script>
        const slider = document.getElementById('image-slider');
        const container = document.querySelector('.container');

        slider.addEventListener('input', (e) => {
            const val = e.target.value;
            container.style.setProperty('--slider-pos', `${val}%`);
        });

        // Add some smooth initial movement or interaction if needed
        window.addEventListener('load', () => {
            // Subtle pulse to indicate interactivity
            setTimeout(() => {
                container.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
                container.style.setProperty('--slider-pos', '60%');
                setTimeout(() => {
                    container.style.setProperty('--slider-pos', '40%');
                    setTimeout(() => {
                        container.style.setProperty('--slider-pos', '50%');
                        setTimeout(() => {
                            container.style.transition = 'none';
                        }, 800);
                    }, 800);
                }, 800);
            }, 500);
        });
    </script>
</body>
</html>
